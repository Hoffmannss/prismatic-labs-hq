<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      color: white;
      overflow: hidden;
    }
    .container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }
    .logo {
      font-size: 56px;
      font-weight: 900;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
      letter-spacing: -1px;
    }
    .subtitle {
      font-size: 16px;
      opacity: 0.95;
      margin-bottom: 40px;
      font-weight: 500;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    .version {
      margin-top: 24px;
      font-size: 12px;
      opacity: 0.7;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.98); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💎 VENDEDOR IA</div>
    <div class="subtitle">Prismatic Labs</div>
    <div class="loader"></div>
    <div class="version">Inicializando sistema...</div>
  </div>
</body>
</html>
