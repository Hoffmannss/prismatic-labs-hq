<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedor IA Cockpit - Prismatic Labs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-main: #0a0e27;
            --bg-secondary: #131834;
            --bg-card: #1a1f3a;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-cyan: #06b6d4;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #2d3748;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        
        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .nav-item:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: var(--text-secondary);
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        
        .metric-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 2.2em;
            font-weight: 700;
            color: var(--accent-cyan);
        }
        
        .metric-value.hot { color: var(--danger); }
        .metric-value.warm { color: var(--warning); }
        .metric-value.success { color: var(--success); }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .card-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1em;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }
        
        .leads-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .leads-table th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .leads-table td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .leads-table tr:hover {
            background: var(--bg-secondary);
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-hot { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-warm { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .badge-cold { background: rgba(6, 182, 212, 0.2); color: var(--accent-cyan); }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.75em;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--success);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🤖 Vendedor IA</div>
        <div class="nav-item active" data-section="leads">
            <span>📈</span> Leads
        </div>
        <div class="nav-item" data-section="autopilot">
            <span>🚀</span> Autopilot
        </div>
        <div class="nav-item" data-section="tracker">
            <span>🎯</span> Tracker
        </div>
        <div class="nav-item" data-section="stats">
            <span>📊</span> Stats
        </div>
    </div>
    
    <div class="main">
        <div class="header">
            <h1>Cockpit de Prospecção</h1>
            <p>Prismatic Labs — Sistema de Vendas Automatizado</p>
        </div>
        
        <!-- LEADS SECTION -->
        <div id="section-leads" class="section active">
            <div class="metrics-grid" id="leadsMetrics"></div>
            <div class="card">
                <div class="card-title">Todos os Leads</div>
                <div id="leadsTableContainer"></div>
            </div>
        </div>
        
        <!-- AUTOPILOT SECTION -->
        <div id="section-autopilot" class="section">
            <div class="card">
                <div class="card-title">🚀 Rodar Pipeline Autopilot</div>
                <div id="autopilotAlert"></div>
                <div class="form-group">
                    <label>Nicho / Hashtag</label>
                    <input type="text" id="autopilot-nicho" placeholder="api-automacao" value="api-automacao">
                </div>
                <div class="form-group">
                    <label>Quantidade de Leads</label>
                    <input type="number" id="autopilot-qtd" placeholder="20" value="20">
                </div>
                <div class="form-group">
                    <label>Máx. Analyze Simultâneo</label>
                    <input type="number" id="autopilot-max" placeholder="8" value="8">
                </div>
                <button class="btn btn-primary" onclick="runAutopilot()">Iniciar Autopilot</button>
            </div>
        </div>
        
        <!-- TRACKER SECTION -->
        <div id="section-tracker" class="section">
            <div class="card">
                <div class="card-title">🎯 Registrar Outcome</div>
                <div id="trackerAlert"></div>
                <div class="form-group">
                    <label>Username (sem @)</label>
                    <input type="text" id="tracker-username" placeholder="usuario">
                </div>
                <div class="form-group">
                    <label>Ação</label>
                    <select id="tracker-action">
                        <option value="sent">Mensagem Enviada</option>
                        <option value="respondeu">Respondeu</option>
                        <option value="ignorou">Ignorou</option>
                        <option value="negociando">Em Negociação</option>
                        <option value="converteu">Converteu</option>
                        <option value="recusou">Recusou</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Extra (nota ou valor R$)</label>
                    <input type="text" id="tracker-extra" placeholder="Opcional">
                </div>
                <button class="btn btn-success" onclick="submitTracker()">Registrar</button>
            </div>
        </div>
        
        <!-- STATS SECTION -->
        <div id="section-stats" class="section">
            <div class="metrics-grid" id="statsMetrics"></div>
            <div class="card">
                <div class="card-title">🧠 Learning System</div>
                <div id="learningData"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentSection = 'leads';
        let leadsData = [];
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const section = item.dataset.section;
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById(`section-${section}`).classList.add('active');
                currentSection = section;
                if (section === 'stats') loadStats();
            });
        });
        
        // Load Leads
        async function loadLeads() {
            try {
                const res = await fetch('/api/leads');
                const data = await res.json();
                leadsData = data.leads || [];
                renderLeadsMetrics(leadsData);
                renderLeadsTable(leadsData);
            } catch (err) {
                console.error('Erro ao carregar leads:', err);
            }
        }
        
        function renderLeadsMetrics(leads) {
            const total = leads.length;
            const hot = leads.filter(l => l.prioridade === 'hot').length;
            const warm = leads.filter(l => l.prioridade === 'warm').length;
            const contatados = leads.filter(l => l.primeira_mensagem_enviada).length;
            const fechados = leads.filter(l => l.status === 'fechado').length;
            
            document.getElementById('leadsMetrics').innerHTML = `
                <div class="metric-card">
                    <div class="metric-label">Total Leads</div>
                    <div class="metric-value">${total}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Hot Leads</div>
                    <div class="metric-value hot">${hot}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Warm Leads</div>
                    <div class="metric-value warm">${warm}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Contatados</div>
                    <div class="metric-value">${contatados}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Fechados</div>
                    <div class="metric-value success">${fechados}</div>
                </div>
            `;
        }
        
        function renderLeadsTable(leads) {
            if (leads.length === 0) {
                document.getElementById('leadsTableContainer').innerHTML = '<div class="empty-state">💭 Nenhum lead cadastrado</div>';
                return;
            }
            
            const html = `
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Prioridade</th>
                            <th>Score</th>
                            <th>Status</th>
                            <th>Nicho</th>
                            <th>Outcome</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${leads.map(l => `
                            <tr>
                                <td><strong>@${l.username}</strong></td>
                                <td><span class="badge badge-${l.prioridade}">${l.prioridade}</span></td>
                                <td>${l.score}/100</td>
                                <td><span class="status-badge">${l.status}</span></td>
                                <td>${l.nicho || 'N/A'}</td>
                                <td>${l.outcome || '-'}</td>
                                <td>
                                    <div class="actions">
                                        <button class="btn btn-sm btn-secondary" onclick="viewLead('${l.username}')">Ver</button>
                                        <button class="btn btn-sm btn-success" onclick="quickTrack('${l.username}', 'respondeu')">Respondeu</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('leadsTableContainer').innerHTML = html;
        }
        
        function viewLead(username) {
            const lead = leadsData.find(l => l.username === username);
            if (!lead) return;
            alert(JSON.stringify(lead, null, 2));
        }
        
        async function quickTrack(username, action) {
            try {
                const res = await fetch('/api/tracker', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, action })
                });
                const data = await res.json();
                if (data.ok) {
                    alert(`✅ ${username} marcado como ${action}`);
                    loadLeads();
                } else {
                    alert(`❌ Erro: ${data.error || 'Desconhecido'}`);
                }
            } catch (err) {
                alert(`❌ Erro: ${err.message}`);
            }
        }
        
        async function runAutopilot() {
            const nicho = document.getElementById('autopilot-nicho').value;
            const qtd = document.getElementById('autopilot-qtd').value;
            const max = document.getElementById('autopilot-max').value;
            
            try {
                const res = await fetch('/api/autopilot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nicho, qtd: Number(qtd), maxAnalyze: Number(max) })
                });
                const data = await res.json();
                document.getElementById('autopilotAlert').innerHTML = 
                    `<div class="alert alert-success">✅ ${data.message}</div>`;
            } catch (err) {
                document.getElementById('autopilotAlert').innerHTML = 
                    `<div class="alert alert-error">❌ Erro: ${err.message}</div>`;
            }
        }
        
        async function submitTracker() {
            const username = document.getElementById('tracker-username').value;
            const action = document.getElementById('tracker-action').value;
            const extra = document.getElementById('tracker-extra').value;
            
            if (!username) {
                alert('❌ Username obrigatório');
                return;
            }
            
            try {
                const res = await fetch('/api/tracker', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, action, extra })
                });
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('trackerAlert').innerHTML = 
                        `<div class="alert alert-success">✅ Outcome registrado</div>`;
                    document.getElementById('tracker-username').value = '';
                    document.getElementById('tracker-extra').value = '';
                } else {
                    document.getElementById('trackerAlert').innerHTML = 
                        `<div class="alert alert-error">❌ ${data.error}</div>`;
                }
            } catch (err) {
                document.getElementById('trackerAlert').innerHTML = 
                    `<div class="alert alert-error">❌ ${err.message}</div>`;
            }
        }
        
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                document.getElementById('statsMetrics').innerHTML = `
                    <div class="metric-card">
                        <div class="metric-label">Total Leads</div>
                        <div class="metric-value">${data.total}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Enviadas</div>
                        <div class="metric-value">${data.byOutcome.enviada}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Responderam</div>
                        <div class="metric-value success">${data.byOutcome.respondeu}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Convertidos</div>
                        <div class="metric-value success">${data.byOutcome.converteu}</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Valor Total</div>
                        <div class="metric-value success">R$ ${data.totalValue.toFixed(2)}</div>
                    </div>
                `;
                
                if (data.learning) {
                    document.getElementById('learningData').innerHTML = `
                        <p><strong>Versão:</strong> ${data.learning.versao}</p>
                        <p><strong>Score Médio:</strong> ${data.learning.score_medio}</p>
                        <p><strong>Amostras:</strong> ${data.learning.total_amostras}</p>
                    `;
                } else {
                    document.getElementById('learningData').innerHTML = '<p>Nenhum dado de learning disponível</p>';
                }
            } catch (err) {
                console.error('Erro ao carregar stats:', err);
            }
        }
        
        // Init
        loadLeads();
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
