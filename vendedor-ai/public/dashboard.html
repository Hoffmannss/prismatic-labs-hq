<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedor IA Dashboard - Prismatic Labs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
        }
        
        .metric-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .metric-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-value.hot { color: #f56565; }
        .metric-value.warm { color: #ed8936; }
        .metric-value.success { color: #48bb78; }
        
        .leads-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        
        .leads-grid {
            display: grid;
            gap: 15px;
        }
        
        .lead-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }
        
        .lead-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateX(5px);
        }
        
        .lead-card.hot { border-left-color: #f56565; }
        .lead-card.warm { border-left-color: #ed8936; }
        .lead-card.cold { border-left-color: #4299e1; }
        
        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .lead-username {
            font-size: 1.3em;
            font-weight: bold;
            color: #2d3748;
        }
        
        .lead-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .badge-hot { background: #fed7d7; color: #c53030; }
        .badge-warm { background: #feebc8; color: #c05621; }
        .badge-cold { background: #bee3f8; color: #2c5282; }
        
        .lead-details {
            color: #4a5568;
            line-height: 1.6;
        }
        
        .lead-details strong {
            color: #2d3748;
        }
        
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            background: #e6fffa;
            color: #234e52;
            margin-left: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }
        
        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        
        .refresh-btn:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Vendedor IA Dashboard</h1>
            <p class="subtitle">Prismatic Labs - Sistema de Prospecção Automática</p>
            <button class="refresh-btn" onclick="loadData()">🔄 Atualizar Dados</button>
        </header>
        
        <div class="metrics" id="metrics"></div>
        
        <div class="leads-section">
            <h2>🔥 Hot Leads</h2>
            <div class="leads-grid" id="hotLeads"></div>
        </div>
        
        <div class="leads-section">
            <h2>📋 Todos os Leads</h2>
            <div class="leads-grid" id="allLeads"></div>
        </div>
        
        <footer>
            <p>Prismatic Labs © 2026 - Vendedor IA v1.0</p>
        </footer>
    </div>
    
    <script>
        async function loadData() {
            try {
                const [dbRes, pipelineRes] = await Promise.all([
                    fetch('/api/leads'),
                    fetch('/api/pipeline')
                ]);
                
                const db = await dbRes.json();
                const pipeline = await pipelineRes.json();
                
                renderMetrics(db, pipeline);
                renderHotLeads(db.leads);
                renderAllLeads(db.leads);
            } catch (err) {
                console.error('Erro ao carregar dados:', err);
            }
        }
        
        function renderMetrics(db, pipeline) {
            const metricsDiv = document.getElementById('metrics');
            const total = db.leads.length;
            const hot = pipeline.por_prioridade?.hot || 0;
            const warm = pipeline.por_prioridade?.warm || 0;
            const fechados = db.leads.filter(l => l.status === 'fechado').length;
            const taxa = pipeline.taxa_contato || 0;
            
            metricsDiv.innerHTML = `
                <div class="metric-card">
                    <div class="metric-label">Total de Leads</div>
                    <div class="metric-value">${total}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Hot Leads</div>
                    <div class="metric-value hot">${hot}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Warm Leads</div>
                    <div class="metric-value warm">${warm}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Fechados</div>
                    <div class="metric-value success">${fechados}</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Taxa de Contato</div>
                    <div class="metric-value">${taxa}%</div>
                </div>
            `;
        }
        
        function renderHotLeads(leads) {
            const hotLeadsDiv = document.getElementById('hotLeads');
            const hotLeads = leads.filter(l => l.prioridade === 'hot');
            
            if (hotLeads.length === 0) {
                hotLeadsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>Nenhum hot lead no momento</p></div>';
                return;
            }
            
            hotLeadsDiv.innerHTML = hotLeads.map(lead => `
                <div class="lead-card hot">
                    <div class="lead-header">
                        <span class="lead-username">@${lead.username}</span>
                        <span class="lead-badge badge-hot">HOT</span>
                    </div>
                    <div class="lead-details">
                        <strong>Score:</strong> ${lead.score}/100<br>
                        <strong>Nicho:</strong> ${lead.nicho || 'N/A'}<br>
                        <strong>Status:</strong> <span class="status-badge">${lead.status}</span><br>
                        <strong>Problema:</strong> ${lead.problema_principal || 'N/A'}
                    </div>
                </div>
            `).join('');
        }
        
        function renderAllLeads(leads) {
            const allLeadsDiv = document.getElementById('allLeads');
            
            if (leads.length === 0) {
                allLeadsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>Nenhum lead cadastrado</p></div>';
                return;
            }
            
            allLeadsDiv.innerHTML = leads.map(lead => `
                <div class="lead-card ${lead.prioridade}">
                    <div class="lead-header">
                        <span class="lead-username">@${lead.username}</span>
                        <span class="lead-badge badge-${lead.prioridade}">${lead.prioridade.toUpperCase()}</span>
                    </div>
                    <div class="lead-details">
                        <strong>Score:</strong> ${lead.score}/100<br>
                        <strong>Nicho:</strong> ${lead.nicho || 'N/A'}<br>
                        <strong>Status:</strong> <span class="status-badge">${lead.status}</span><br>
                        <strong>Tipo de Negócio:</strong> ${lead.tipo_negocio || 'N/A'}<br>
                        ${lead.primeira_mensagem_enviada ? '<strong>✅ Primeira mensagem enviada</strong>' : '<strong>⏳ Aguardando contato</strong>'}
                    </div>
                </div>
            `).join('');
        }
        
        // Carregar dados ao abrir a página
        loadData();
        
        // Auto-refresh a cada 30 segundos
        setInterval(loadData, 30000);
    </script>
</body>
</html>
