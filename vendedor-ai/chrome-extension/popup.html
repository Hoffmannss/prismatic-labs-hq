<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedor IA Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e2e8f0;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 1.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.85em;
            color: #94a3b8;
        }
        
        .status {
            background: #1a1f3a;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            color: #94a3b8;
            font-size: 0.9em;
        }
        
        .status-value {
            font-weight: 600;
            color: #06b6d4;
        }
        
        .status-value.active {
            color: #10b981;
        }
        
        .status-value.inactive {
            color: #ef4444;
        }
        
        .toggle-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        
        .toggle-btn.active {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .toggle-btn.inactive {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .toggle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .recent-list {
            margin-top: 15px;
        }
        
        .recent-title {
            font-size: 0.9em;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        .recent-item {
            background: #131834;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 0.85em;
        }
        
        .recent-username {
            font-weight: 600;
            color: #667eea;
        }
        
        .recent-time {
            color: #64748b;
            font-size: 0.8em;
            margin-top: 4px;
        }
        
        .empty-state {
            text-align: center;
            color: #64748b;
            padding: 20px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🤖 Vendedor IA</div>
        <div class="subtitle">Monitor Instagram</div>
    </div>
    
    <div class="status">
        <div class="status-row">
            <span class="status-label">Status</span>
            <span class="status-value" id="statusText">Carregando...</span>
        </div>
        <div class="status-row">
            <span class="status-label">Respostas Detectadas</span>
            <span class="status-value" id="totalDetected">0</span>
        </div>
    </div>
    
    <button class="toggle-btn" id="toggleBtn">Carregando...</button>
    
    <div class="recent-list">
        <div class="recent-title">⌛ Últimas Detecções</div>
        <div id="recentList"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
