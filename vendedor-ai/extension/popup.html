<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendedor IA - DM Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 0.85em;
            opacity: 0.9;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .status-value {
            font-weight: 600;
            font-size: 1.1em;
        }
        
        .indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 8px;
        }
        
        .indicator.active {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
        
        .indicator.inactive {
            background: #ef4444;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }
        
        .btn-toggle {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }
        
        .btn-toggle:hover {
            background: white;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.9em;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .footer {
            text-align: center;
            font-size: 0.75em;
            opacity: 0.7;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Vendedor IA</h1>
        <p>DM Monitor Extension</p>
    </div>
    
    <div class="status">
        <div class="status-row">
            <span class="status-label">Status:</span>
            <span class="status-value" id="statusText">
                Carregando...
                <span class="indicator" id="statusIndicator"></span>
            </span>
        </div>
        <div class="status-row">
            <span class="status-label">DMs Processadas:</span>
            <span class="status-value" id="processedCount">0</span>
        </div>
    </div>
    
    <button class="btn btn-toggle" id="toggleBtn">Carregando...</button>
    <button class="btn btn-secondary" id="openDashboard">Abrir Dashboard</button>
    
    <div class="footer">
        Prismatic Labs © 2026
    </div>
    
    <script>
        let monitoringActive = true;
        
        // Load status on popup open
        function loadStatus() {
            chrome.runtime.sendMessage({ type: 'GET_STATUS' }, (response) => {
                if (chrome.runtime.lastError) {
                    console.error('Erro:', chrome.runtime.lastError);
                    return;
                }
                
                monitoringActive = response.active;
                updateUI(response);
            });
        }
        
        // Update UI based on status
        function updateUI(data) {
            const statusText = document.getElementById('statusText');
            const statusIndicator = document.getElementById('statusIndicator');
            const processedCount = document.getElementById('processedCount');
            const toggleBtn = document.getElementById('toggleBtn');
            
            if (data.active) {
                statusText.innerHTML = 'Ativo <span class="indicator active" id="statusIndicator"></span>';
                toggleBtn.textContent = '⏸️ Pausar Monitoring';
            } else {
                statusText.innerHTML = 'Pausado <span class="indicator inactive" id="statusIndicator"></span>';
                toggleBtn.textContent = '▶️ Retomar Monitoring';
            }
            
            processedCount.textContent = data.processed || 0;
        }
        
        // Toggle monitoring
        document.getElementById('toggleBtn').addEventListener('click', () => {
            chrome.runtime.sendMessage({ type: 'TOGGLE_MONITORING' }, (response) => {
                if (chrome.runtime.lastError) {
                    console.error('Erro:', chrome.runtime.lastError);
                    return;
                }
                
                monitoringActive = response.active;
                loadStatus();
            });
        });
        
        // Open dashboard
        document.getElementById('openDashboard').addEventListener('click', () => {
            chrome.tabs.create({ url: 'http://localhost:3131' });
        });
        
        // Initial load
        loadStatus();
        
        // Refresh every 2 seconds while popup is open
        setInterval(loadStatus, 2000);
    </script>
</body>
</html>
